name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json

      # backend: tests have to pass, then make sure it still compiles
      - name: server
        working-directory: server
        run: |
          npm ci
          npm test
          npm run build

      # dashboard: a clean production build is enough of a check for now
      - name: dashboard
        working-directory: web
        run: |
          npm ci
          npm run build
