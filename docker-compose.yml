# Tally runs as one container. How it's exposed depends on your server:
#
#   - Already running nginx/apache + certbot? Use the default below: Tally binds
#     to localhost only and your existing proxy handles the domain and TLS.
#       docker compose up -d --build
#
#   - Nothing on ports 80/443 yet? Bring up the bundled Caddy too for automatic
#     HTTPS (it's behind a profile so it stays off by default):
#       docker compose --profile caddy up -d --build
#
# Values come from a .env file next to this one (see .env.example).

services:
  tally:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - TALLY_DB=/data/tally.sqlite
      # leave empty to keep the dashboard open; set it to lock it down
      - TALLY_TOKEN=${TALLY_TOKEN:-}
      # per-IP rate limit on /api/collect; defaults suit a single site
      - TALLY_RATE_MAX=${TALLY_RATE_MAX:-120}
      - TALLY_RATE_WINDOW=${TALLY_RATE_WINDOW:-1 minute}
    # published on localhost only, so an existing reverse proxy can reach it
    # without exposing Tally straight to the internet. Change the host port if
    # 3000 is already taken on the box.
    ports:
      - "127.0.0.1:${TALLY_HOST_PORT:-3000}:3000"
    volumes:
      - tally-data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["caddy"]
    depends_on:
      - tally
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TALLY_DOMAIN=${TALLY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  tally-data:
  caddy-data:
  caddy-config:
