<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tally — demo</title>
    <style>
      body { font: 16px/1.6 system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
      button { font: inherit; padding: .5rem 1rem; margin-right: .5rem; cursor: pointer; }
      code { background: #f2f2f2; padding: .1rem .3rem; border-radius: 4px; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <h1>Tally demo page</h1>
    <p class="muted">
      This page loads the tracker below. Loading it counted one pageview.
      The buttons fake navigation and a custom event so you have data to look at.
    </p>

    <p>
      <button onclick="history.pushState({}, '', '/pricing')">Go to /pricing</button>
      <button onclick="history.pushState({}, '', '/blog/hello')">Go to /blog/hello</button>
      <button onclick="window.tally('signup')">Fire a "signup" event</button>
    </p>

    <p>
      Now check
      <code><a href="/api/stats?site=demo&range=24h">/api/stats?site=demo&range=24h</a></code>.
    </p>

    <script defer src="/tracker.js" data-site="demo"></script>
  </body>
</html>
